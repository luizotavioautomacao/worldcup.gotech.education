name: Fetch World Cup 2026 live data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-worldcup2026-live
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch kickoff26 + ESPN snapshot
        run: python scripts/fetch_worldcup2026_live.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/worldcup2026-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update worldcup2026 live snapshot"
            git push
          fi
